# Where converted reports land (each report in its own subfolder).
# Shared by the REST endpoint and CLI batch mode.
prpt2aspose.output-dir=output

# Real-world .prpt files can carry embedded images/resources.
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

spring.application.name=prpt2aspose
